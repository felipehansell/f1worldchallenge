name: Sincronizar Planilha

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar script de sincronização
        run: python sync.py

      - name: Salvar arquivos atualizados
        run: |
          git config user.name "F1WC Bot"
          git config user.email "bot@f1wc.com"
          git add data/
          git diff --staged --quiet || git commit -m "Atualizar dados da planilha"
          git push
